name: Keep Supabase alive

on:
  schedule:
    - cron: '0 9 */5 * *'  # cada 5 días a las 9:00 UTC
  workflow_dispatch:        # permite ejecutarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            https://epmltqhtxkmfboaxdois.supabase.co/functions/v1/get-publications
          echo " — ping enviado"
