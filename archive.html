<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archivo | Criterial Signals</title>
  <meta name="description" content="Archivo de publicaciones de Criterial Signals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="topbar">
        <a href="index.html" class="brand">Criterial Signals</a>
        <nav class="nav">
          <a href="sample.html">Muestra</a>
          <a href="pricing.html">Planes</a>
          <a href="about.html">Nosotros</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container hero">
    <p class="eyebrow">Archivo</p>
    <h1>Archivo de publicaciones</h1>
    <p class="subheadline">Acceso exclusivo para suscriptores del plan Pro.</p>
  </main>

  <!-- Loading state -->
  <section class="container section" id="loading-section">
    <p style="color: #AAAAAA; font-size: 14px;">Cargando...</p>
  </section>

  <!-- Auth section: shown when not authenticated -->
  <section class="container section" id="auth-section" style="display: none;">
    <div class="card card--narrow">
      <h2>Acceder al archivo</h2>
      <p style="margin: 10px 0 20px;">
        Introduce tu email de suscripción y te enviamos un enlace de acceso directo.
      </p>
      <label for="auth-email">Email</label>
      <input id="auth-email" type="email" placeholder="tu@email.com" class="text-input" />
      <div class="cta-group" style="margin-top: 4px;">
        <button id="send-magic-link" class="btn btn-primary">Enviar enlace de acceso</button>
      </div>
      <p id="auth-status" style="margin-top: 16px; font-size: 14px; color: #555;"></p>
    </div>
  </section>

  <!-- Content section: shown when authenticated -->
  <section class="container section" id="content-section" style="display: none;">
    <div class="archive-bar">
      <p id="user-email"></p>
      <button id="sign-out" class="btn btn-secondary">Cerrar sesión</button>
    </div>
    <div id="publications-list"></div>
  </section>

  <footer class="site-footer container">
    <p>Criterial Signals &mdash; Inteligencia de mercado para Iberia.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const SUPABASE_URL = "https://epmltqhtxkmfboaxdois.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbWx0cWh0eGttZmJvYXhkb2lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTM2NTksImV4cCI6MjA5MjUyOTY1OX0.uBaMbfr_efiatUSuQnRKH_q85Wm_8fih_fGmb674nBI";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authSection      = document.getElementById("auth-section");
    const contentSection   = document.getElementById("content-section");
    const loadingSection   = document.getElementById("loading-section");
    const userEmailEl      = document.getElementById("user-email");
    const publicationsList = document.getElementById("publications-list");
    const authStatus       = document.getElementById("auth-status");

    function showSection(name) {
      loadingSection.style.display  = name === "loading" ? "" : "none";
      authSection.style.display     = name === "auth"    ? "" : "none";
      contentSection.style.display  = name === "content" ? "" : "none";
    }

    async function loadPublications(accessToken) {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/get-publications`,
        { headers: { "Authorization": `Bearer ${accessToken}` } }
      );
      const json = await res.json();
      const data = json.publications;

      if (!res.ok || !data || data.length === 0) {
        publicationsList.innerHTML =
          '<p style="color: #AAAAAA; font-size: 14px;">No hay publicaciones disponibles todavía.</p>';
        return;
      }

      publicationsList.innerHTML = data.map((pub) => {
        const date = pub.period_start
          ? new Date(pub.period_start).toLocaleDateString("es-ES", { year: "numeric", month: "long", day: "numeric" })
          : new Date(pub.created_at).toLocaleDateString("es-ES", { year: "numeric", month: "long", day: "numeric" });

        const body = pub.body_markdown
          ? marked.parse(pub.body_markdown)
          : "<p><em>Contenido no disponible.</em></p>";

        return `
          <div class="pub-card">
            <p class="pub-meta">${pub.type} &mdash; ${date}</p>
            <h2>${pub.title}</h2>
            <div class="pub-body">${body}</div>
          </div>`;
      }).join("");
    }

    document.getElementById("send-magic-link").addEventListener("click", async () => {
      const email = document.getElementById("auth-email").value.trim();
      if (!email) { authStatus.textContent = "Introduce tu email."; return; }
      authStatus.textContent = "Enviando enlace...";
      const { error } = await client.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href.split("#")[0] }
      });
      authStatus.textContent = error
        ? "Error al enviar el enlace. Inténtalo de nuevo."
        : "Enlace enviado. Revisa tu bandeja de entrada.";
    });

    document.getElementById("sign-out").addEventListener("click", async () => {
      await client.auth.signOut();
    });

    let sessionResolved = false;

    async function handleSession(session) {
      if (sessionResolved) return;
      sessionResolved = true;

      if (session) {
        showSection("loading");
        userEmailEl.textContent = session.user.email;
        try {
          await loadPublications(session.access_token);
        } catch (err) {
          publicationsList.innerHTML = '<p style="color: #AAAAAA; font-size: 14px;">Error al cargar publicaciones.</p>';
        }
        showSection("content");
      } else {
        showSection("auth");
      }
    }

    // Fallback: if onAuthStateChange doesn't fire in 5s, show auth form
    const fallbackTimer = setTimeout(() => {
      if (!sessionResolved) { sessionResolved = true; showSection("auth"); }
    }, 5000);

    client.auth.onAuthStateChange((_event, session) => {
      clearTimeout(fallbackTimer);
      handleSession(session);
    });
  </script>
</body>
</html>
