<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230D1F3C'/><text x='3' y='26' font-family='Georgia,serif' font-size='22' font-weight='400' fill='white' letter-spacing='-1'>C.</text></svg>" />
  <title>Tu muestra | Criterial.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.v5.css" />
  <style>
    body { background: #F4F0EA; }
    .mu-progress { position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 250; background: transparent; }
    .mu-progress i { display: block; height: 3px; width: 0; background: var(--navy); transition: width 0.1s linear; }
    .mu-wrap { max-width: 760px; margin: 0 auto; padding: 0 32px; }

    .mu-hero { padding: 64px 0 36px; }
    .mu-ey { font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--label); margin: 0 0 18px; }
    .mu-title { font-family: 'EB Garamond', Georgia, serif; font-size: 46px; line-height: 1.12; font-weight: 400; color: var(--navy); margin: 0 0 18px; }
    .mu-tesis { font-size: 17px; line-height: 1.7; color: var(--muted); font-weight: 300; max-width: 600px; margin: 0; }
    .mu-tags { margin: 24px 0 0; }
    .mu-tag { display: inline-block; font-size: 11px; padding: 4px 11px; background: #ECE7DE; color: #6f6a60; margin: 0 6px 6px 0; border-radius: 2px; }

    .mu-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 8px 0 40px; }
    .mu-stat { background: #fff; border: 0.5px solid var(--border); border-radius: 7px; padding: 15px 16px; }
    .mu-stat-l { font-size: 8.5px; letter-spacing: .1em; text-transform: uppercase; color: #a59f93; margin: 0 0 8px; line-height: 1.35; }
    .mu-stat-v { font-family: 'EB Garamond', Georgia, serif; font-size: 22px; color: var(--navy); margin: 0; }

    .mu-block { padding: 40px 0; border-top: 0.5px solid var(--border); }
    .mu-section-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--label); margin: 0 0 18px; }
    .mu-snapshot { font-family: 'EB Garamond', Georgia, serif; font-size: 20px; line-height: 1.85; color: #33312c; border-left: 2px solid var(--navy); padding-left: 24px; margin: 0; }
    .mu-snapshot strong { font-weight: 500; color: var(--navy); }

    .mu-signal { padding: 22px; border: 0.5px solid var(--border); border-radius: 7px; background: #fff; margin-bottom: 12px; transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .mu-signal:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(13,31,60,0.07); }
    .mu-signal-head { display: flex; align-items: center; gap: 12px; margin: 0 0 10px; }
    .mu-signal-n { font-size: 11px; letter-spacing: .1em; color: #c2bcb0; }
    .mu-signal-t { font-family: 'EB Garamond', Georgia, serif; font-size: 19px; font-weight: 400; color: var(--navy); flex: 1; line-height: 1.3; }
    .mu-pill { font-size: 8.5px; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .mu-signal-b { font-size: 14.5px; line-height: 1.7; color: #555; margin: 0; }

    .mu-watch { background: #F8F6F2; border: 0.5px solid var(--border); border-radius: 7px; padding: 24px 26px; }
    .mu-watch-item { margin-bottom: 18px; }
    .mu-watch-item:last-child { margin-bottom: 0; }
    .mu-watch-t { font-family: 'EB Garamond', Georgia, serif; font-size: 17px; color: var(--navy); margin: 0 0 5px; }
    .mu-watch-b { font-size: 13.5px; line-height: 1.6; color: #666; margin: 0; }

    .mu-cta { background: var(--navy); color: #fff; text-align: center; padding: 60px 32px; margin-top: 48px; }
    .mu-cta-text { font-size: 15px; line-height: 1.75; color: #cfd6e0; max-width: 460px; margin: 0 auto 26px; }
    .mu-cta .btn-light { display: inline-block; background: #fff; color: var(--navy); font-size: 12px; letter-spacing: .04em; padding: 13px 30px; border-radius: 3px; text-decoration: none; }

    .mu-state { padding: 160px 0; text-align: center; color: var(--muted); font-size: 15px; }

    .mu-map-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin: 0 0 14px; }
    .mu-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 10.5px; color: #6f6a60; }
    .mu-sw { display: inline-block; width: 15px; height: 3px; vertical-align: middle; margin-right: 5px; border-radius: 2px; }
    .mu-toggle { display: flex; gap: 6px; }
    .mu-tg { font-size: 10px; letter-spacing: .05em; color: #6f6a60; background: #fff; border: 0.5px solid #C9C3B8; border-radius: 3px; padding: 6px 12px; cursor: pointer; transition: background .18s, color .18s; }
    .mu-tg.on { background: var(--navy); color: #fff; border-color: var(--navy); }
    .mu-node { cursor: pointer; }
    .mu-node circle { transition: opacity .18s; }
    .mu-node:hover circle { opacity: .82; }
    .mu-nl { font-family: 'Inter', sans-serif; font-size: 9px; }
    .mu-hdr { font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase; fill: #a59f93; font-family: 'Inter', sans-serif; }
    .mu-detail { background: #fff; border: 0.5px solid var(--border); border-radius: 7px; padding: 16px 18px; min-height: 96px; margin-top: 6px; }
    .mu-detail-h { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 0 0 7px; }
    .mu-detail-t { font-family: 'EB Garamond', Georgia, serif; font-size: 15px; margin: 0; color: var(--navy); }
    .mu-detail-m { font-size: 8.5px; letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
    .mu-detail-b { font-size: 12.5px; line-height: 1.6; color: #555; margin: 0 0 9px; }
    .mu-chip { display: inline-block; font-size: 9.5px; color: #3a4a63; background: #EAEDF2; border-radius: 3px; padding: 2px 8px; margin: 0 5px 5px 0; }
    .mu-map-note { font-size: 10px; color: #b6b0a4; margin: 10px 0 0; }

    @media (max-width: 640px) {
      .mu-wrap { padding: 0 22px; }
      .mu-hero { padding: 48px 0 28px; }
      .mu-title { font-size: 33px; }
      .mu-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="mu-progress"><i id="mu-progress-bar"></i></div>

  <header class="site-header light-header" id="siteHeader">
    <a href="index.html" class="brand">Criterial.</a>
    <nav class="nav">
      <a href="sample.html">Signals</a>
      <a href="encargos.html">Advisory</a>
      <a href="about.html">Nosotros</a>
      <a href="archive.html" class="nav-access">Acceso Pro</a>
    </nav>
  </header>

  <main id="mu-root">
    <div class="mu-state" id="mu-loading">Cargando tu muestra…</div>
  </main>

  <footer class="site-footer">
    <span class="footer-brand">Criterial.</span>
    <span class="footer-right">Inteligencia de mercado para España</span>
  </footer>

  <script>
    const GET_SAMPLE_URL = "https://epmltqhtxkmfboaxdois.supabase.co/functions/v1/get-sample";
    const MONTHS_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const MOMENTUM = {
      creciente:   { label: "Creciente",   bg: "#e1efe9", color: "#1d7a5f" },
      estable:     { label: "Estable",     bg: "#efedea", color: "#9a958a" },
      enfriandose: { label: "Enfriándose", bg: "#f3e7e1", color: "#b06a4e" }
    };

    function el(tag, cls, text) {
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text;
      return n;
    }

    function clamp(v, lo, hi) {
      v = Number(v);
      if (!isFinite(v)) return lo;
      return Math.max(lo, Math.min(hi, v));
    }

    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function labelLines(label) {
      const txt = String(label || "");
      const words = txt.split(/\s+/).filter(Boolean);
      if (words.length <= 1 || txt.length <= 9) return [txt];
      return [words[0], words.slice(1).join(" ")];
    }

    // Build the interactive capital map from body_data.mapa. Returns a DOM
    // section, or null if the graph is missing/malformed (defensive: the map
    // is an enhancement — a bad graph must never break the brief).
    function renderMap(mapa) {
      if (!mapa || !Array.isArray(mapa.nodos)) return null;
      const byId = {};
      mapa.nodos.forEach(n => { if (n && n.id != null) byId[n.id] = n; });
      const origins = mapa.nodos.filter(n => n && n.col === "origen" && n.id != null);
      const destinos = mapa.nodos.filter(n => n && n.col === "destino" && n.id != null);
      if (origins.length < 2 || destinos.length < 2) return null;
      const flujos = (Array.isArray(mapa.flujos) ? mapa.flujos : [])
        .filter(f => f && byId[f.from] && byId[f.to] && byId[f.from].col === "origen" && byId[f.to].col === "destino");
      if (flujos.length < 2) return null;
      const detalle = (mapa.detalle && typeof mapa.detalle === "object") ? mapa.detalle : {};

      const W = 640;
      const rows = Math.max(origins.length, destinos.length);
      const H = Math.max(300, 60 + rows * 66);
      const leftX = 105, rightX = W - 105, midX = W / 2;
      const topPad = 56, botPad = 38;
      const usable = H - topPad - botPad;
      function place(arr, x) {
        arr.forEach((n, i) => {
          n._x = x;
          n._y = topPad + usable * ((i + 0.5) / arr.length);
          n._r = 17 + clamp(n.size, 1, 3) * 5;
        });
      }
      place(origins, leftX);
      place(destinos, rightX);

      const edgeW = (p) => 2 + clamp(p, 1, 5) * 1.7;

      const edgesSvg = flujos.map((f, i) => {
        const a = byId[f.from], b = byId[f.to];
        const col = (MOMENTUM[f.momentum] || MOMENTUM.estable).color;
        const wr = edgeW(f.peso_reciente), we = edgeW(f.peso_esperado);
        return `<path id="mf${i}" d="M${a._x},${a._y} C${midX},${a._y} ${midX},${b._y} ${b._x},${b._y}" fill="none" stroke="${col}" stroke-opacity=".5" stroke-linecap="round" stroke-width="${wr}" data-r="${wr}" data-e="${we}"></path>`;
      }).join("");

      const nodeSvg = (n) => {
        const lines = labelLines(n.label);
        const isOrigin = n.col === "origen";
        const fill = isOrigin ? "#0D1F3C" : "#fff";
        const stroke = isOrigin ? "none" : ((MOMENTUM[n.momentum] || MOMENTUM.estable).color);
        const sw = isOrigin ? 0 : 1.6;
        const tFill = isOrigin ? "#fff" : "#0D1F3C";
        const tFill2 = isOrigin ? "#cfd6e0" : "#0D1F3C";
        let text;
        if (lines.length === 1) {
          text = `<text class="mu-nl" x="${n._x}" y="${n._y + 3}" text-anchor="middle" fill="${tFill}">${esc(lines[0])}</text>`;
        } else {
          text = `<text class="mu-nl" x="${n._x}" y="${n._y - 2}" text-anchor="middle" fill="${tFill}" style="font-weight:500">${esc(lines[0])}</text>` +
                 `<text class="mu-nl" x="${n._x}" y="${n._y + 9}" text-anchor="middle" fill="${tFill2}">${esc(lines[1])}</text>`;
        }
        return `<g class="mu-node" data-k="${esc(n.id)}"><circle cx="${n._x}" cy="${n._y}" r="${n._r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"></circle>${text}</g>`;
      };

      const nodesSvg = origins.concat(destinos).map(nodeSvg).join("");
      const oLabel = esc(mapa.col_origen_label || "Origen del capital");
      const dLabel = esc(mapa.col_destino_label || "Destino");

      const svg =
        `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Mapa de flujos de capital del mercado">` +
        `<desc>Flujos de capital desde ${oLabel.toLowerCase()} hacia ${dLabel.toLowerCase()}, con ancho proporcional al volumen y color por momentum.</desc>` +
        `<text class="mu-hdr" x="${leftX}" y="22" text-anchor="middle">${oLabel}</text>` +
        `<text class="mu-hdr" x="${rightX}" y="22" text-anchor="middle">${dLabel}</text>` +
        `<g>${edgesSvg}</g>${nodesSvg}</svg>`;

      const section = el("section", "mu-block reveal");
      section.appendChild(el("p", "mu-section-label", "Mapa de capital"));
      section.innerHTML +=
        `<div class="mu-map-bar">` +
          `<div class="mu-legend">` +
            `<span><span class="mu-sw" style="background:#1d7a5f"></span>Creciente</span>` +
            `<span><span class="mu-sw" style="background:#9a958a"></span>Estable</span>` +
            `<span><span class="mu-sw" style="background:#b06a4e"></span>Enfriándose</span>` +
          `</div>` +
          `<div class="mu-toggle"><button class="mu-tg on" data-mode="r">Reciente</button><button class="mu-tg" data-mode="e">Esperado</button></div>` +
        `</div>` +
        svg +
        `<div class="mu-detail">` +
          `<div class="mu-detail-h"><p class="mu-detail-t" id="mu-det-t"></p><span class="mu-detail-m" id="mu-det-m"></span></div>` +
          `<p class="mu-detail-b" id="mu-det-b"></p><div id="mu-det-c"></div>` +
        `</div>` +
        `<p class="mu-map-note">Toca un nodo para explorar · datos generados para tu temática</p>`;

      // Wire interactivity.
      const detT = section.querySelector("#mu-det-t");
      const detM = section.querySelector("#mu-det-m");
      const detB = section.querySelector("#mu-det-b");
      const detC = section.querySelector("#mu-det-c");
      function showDetail(id) {
        const n = byId[id];
        if (!n) return;
        const det = detalle[id] || {};
        const mom = MOMENTUM[n.momentum] || MOMENTUM.estable;
        detT.textContent = det.titulo || n.label || "";
        detM.textContent = mom.label;
        detM.style.color = mom.color;
        detB.textContent = det.cuerpo || "";
        const chips = Array.isArray(det.chips) ? det.chips.slice(0, 4) : [];
        detC.innerHTML = chips.map(c => `<span class="mu-chip">${esc(c)}</span>`).join("");
      }
      section.querySelectorAll(".mu-node").forEach(g => {
        const id = g.getAttribute("data-k");
        g.addEventListener("mouseenter", () => showDetail(id));
        g.addEventListener("click", () => showDetail(id));
      });
      const edges = section.querySelectorAll("path[id^=mf]");
      const btns = section.querySelectorAll(".mu-tg");
      btns.forEach(b => b.addEventListener("click", () => {
        const mode = b.getAttribute("data-mode");
        edges.forEach(p => p.setAttribute("stroke-width", p.getAttribute(mode === "r" ? "data-r" : "data-e")));
        btns.forEach(x => x.classList.toggle("on", x === b));
      }));

      // Default detail: a growing destination if any, else the first.
      const def = destinos.find(n => n.momentum === "creciente") || destinos[0];
      showDetail(def.id);

      return section;
    }

    function periodLabel(s) {
      const raw = s.created_at;
      if (!raw) return "Muestra";
      const dte = new Date(raw);
      if (isNaN(dte)) return "Muestra";
      return `${MONTHS_ES[dte.getMonth()]} ${dte.getFullYear()}`;
    }

    function showState(msg) {
      const root = document.getElementById("mu-root");
      root.innerHTML = "";
      const w = el("div", "mu-wrap");
      w.appendChild(el("div", "mu-state", msg));
      root.appendChild(w);
    }

    function render(s) {
      const d = s.body_data;
      if (!d) {
        showState("Esta muestra no está disponible en el nuevo formato.");
        return;
      }
      const root = document.getElementById("mu-root");
      root.innerHTML = "";
      const wrap = el("div", "mu-wrap");

      // Hero
      const hero = el("section", "mu-hero reveal");
      const period = periodLabel(s);
      const eyText = d.sector
        ? `Signals · Muestra · ${d.sector} · ${period}`
        : `Signals · Muestra · ${period}`;
      hero.appendChild(el("p", "mu-ey", eyText));
      hero.appendChild(el("h1", "mu-title", d.titulo || s.title || "Tu muestra"));
      if (d.tesis) hero.appendChild(el("p", "mu-tesis", d.tesis));
      if (Array.isArray(d.tags) && d.tags.length) {
        const tags = el("div", "mu-tags");
        d.tags.forEach(t => tags.appendChild(el("span", "mu-tag", t)));
        hero.appendChild(tags);
      }
      wrap.appendChild(hero);

      // Stats
      if (Array.isArray(d.stats) && d.stats.length) {
        const stats = el("div", "mu-stats reveal");
        d.stats.slice(0, 4).forEach(st => {
          const c = el("div", "mu-stat");
          c.appendChild(el("p", "mu-stat-l", st.label || ""));
          c.appendChild(el("p", "mu-stat-v", st.valor || ""));
          stats.appendChild(c);
        });
        wrap.appendChild(stats);
      }

      // Snapshot
      if (d.snapshot) {
        const block = el("section", "mu-block reveal");
        block.appendChild(el("p", "mu-section-label", "Resumen ejecutivo"));
        block.appendChild(el("p", "mu-snapshot", d.snapshot));
        wrap.appendChild(block);
      }

      // Signals
      if (Array.isArray(d.signals) && d.signals.length) {
        const block = el("section", "mu-block reveal");
        block.appendChild(el("p", "mu-section-label", "Señales del periodo"));
        d.signals.forEach((sig, i) => {
          const item = el("div", "mu-signal");
          const head = el("div", "mu-signal-head");
          head.appendChild(el("span", "mu-signal-n", String(i + 1).padStart(2, "0")));
          head.appendChild(el("span", "mu-signal-t", sig.titulo || ""));
          const mom = MOMENTUM[sig.momentum];
          if (mom) {
            const m = el("span", "mu-pill", mom.label);
            m.style.background = mom.bg;
            m.style.color = mom.color;
            head.appendChild(m);
          }
          item.appendChild(head);
          item.appendChild(el("p", "mu-signal-b", sig.cuerpo || ""));
          block.appendChild(item);
        });
        wrap.appendChild(block);
      }

      // Capital map (Phase 2) — rendered only if the graph is valid.
      try {
        const mapSection = renderMap(d.mapa);
        if (mapSection) wrap.appendChild(mapSection);
      } catch (e) {
        // A malformed map must never break the brief; skip it silently.
      }

      // Watch
      if (Array.isArray(d.watch) && d.watch.length) {
        const block = el("section", "mu-block reveal");
        block.appendChild(el("p", "mu-section-label", "Qué vigilar"));
        const box = el("div", "mu-watch");
        d.watch.forEach(w => {
          const it = el("div", "mu-watch-item");
          it.appendChild(el("p", "mu-watch-t", w.titulo || ""));
          it.appendChild(el("p", "mu-watch-b", w.cuerpo || ""));
          box.appendChild(it);
        });
        block.appendChild(box);
        wrap.appendChild(block);
      }

      root.appendChild(wrap);

      // CTA — full-width navy band outside the reading column.
      const cta = el("section", "mu-cta reveal");
      const inner = el("div");
      inner.appendChild(el("p", "mu-cta-text", "Esto es una muestra del criterio editorial de Criterial. El plan Pro incluye Signals semanales, el Brief Mensual y el archivo completo de publicaciones."));
      const btn = el("a", "btn-light", "Ver plan Pro");
      btn.href = "pricing.html";
      inner.appendChild(btn);
      cta.appendChild(inner);
      root.appendChild(cta);

      // The shared scroll-reveal observer only watches elements present at
      // DOMContentLoaded; our content is injected after an async fetch, so we
      // run a local observer — with a failsafe that forces everything visible
      // after a short delay so content can never get stuck hidden.
      const items = root.querySelectorAll(".reveal");
      if ("IntersectionObserver" in window) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add("visible"); io.unobserve(e.target); }
          });
        }, { threshold: 0.1 });
        items.forEach(r => io.observe(r));
        setTimeout(() => items.forEach(r => r.classList.add("visible")), 1200);
      } else {
        items.forEach(r => r.classList.add("visible"));
      }
    }

    // Reading progress bar.
    const progressBar = document.getElementById("mu-progress-bar");
    function updateProgress() {
      const h = document.documentElement;
      const max = h.scrollHeight - h.clientHeight;
      const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
      progressBar.style.width = pct + "%";
    }
    window.addEventListener("scroll", updateProgress, { passive: true });

    (async function () {
      const token = new URLSearchParams(location.search).get("token");
      if (!token) {
        showState("Falta el identificador de la muestra. Revisa el enlace de tu email.");
        return;
      }
      try {
        const res = await fetch(`${GET_SAMPLE_URL}?token=${encodeURIComponent(token)}`);
        if (res.status === 404) {
          showState("No encontramos esta muestra. Es posible que el enlace haya caducado.");
          return;
        }
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        render(data.sample);
        updateProgress();
      } catch (err) {
        showState("No se pudo cargar la muestra. Inténtalo de nuevo en unos minutos.");
      }
    })();
  </script>
  <script src="criterial-shared.js?v=3"></script>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="page-transition" id="pageTransition"></div>
</body>
</html>
